services:
  pasaeventos_api:
    container_name: pasaeventos_api
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - '8080:8080'
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      pasaeventos_db:
        condition: service_healthy
      pasaeventos_redis:
        condition: service_healthy
      pasaeventos_rabbitmq:
        condition: service_healthy
      pasaeventos_localstack:
        condition: service_started
      pasaeventos_mailhog:
        condition: service_started
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.10

  pasaeventos_db:
    image: postgres:16-alpine
    container_name: pasaeventos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pasaeventos
      POSTGRES_PASSWORD: pasaeventos
      POSTGRES_DB: pasaeventos
      TZ: America/Guatemala
    ports:
      - '54320:5432'
    volumes:
      - pasaeventos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pasaeventos -d pasaeventos']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.4

  pasaeventos_adminer:
    image: adminer:latest
    container_name: pasaeventos_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: pasaeventos_db
      ADMINER_DESIGN: dracula
    ports:
      - '8082:8080'
    depends_on:
      - pasaeventos_db
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.5

  pasaeventos_redis:
    image: redis:7-alpine
    container_name: pasaeventos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '63790:6379'
    volumes:
      - pasaeventos_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.6

  pasaeventos_rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pasaeventos_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pasaeventos
      RABBITMQ_DEFAULT_PASS: pasaeventos
    ports:
      - '56720:5672'
      - '15673:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.7

  pasaeventos_mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    container_name: pasaeventos_mailhog
    restart: unless-stopped
    logging:
      driver: 'none'
    ports:
      - '10250:1025'
      - '8026:8025'
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.8

  pasaeventos_localstack:
    image: localstack/localstack:3
    container_name: pasaeventos_localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: '0'
      PERSISTENCE: '1'
    ports:
      - '45660:4566'
    volumes:
      - pasaeventos_localstack_data:/var/lib/localstack
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.9

volumes:
  pasaeventos_pg_data:
    external: true
  pasaeventos_redis_data:
    external: true
  pasaeventos_localstack_data:
    external: true

networks:
  pasaeventos_network:
    external: true
    name: pasaeventos_network
