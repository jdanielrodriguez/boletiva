services:
  pasaeventos_api:
    container_name: pasaeventos_api
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      # Anti-abuso de reservas anónimas ON (feature). En prod el cooldown es 1 h;
      # en local lo bajamos a 2 min para poder probarlo sin esperar tanto.
      - RESERVATION_ANON_LIMIT=true
      - RESERVATION_ANON_COOLDOWN_SECONDS=120
    ports:
      - '8080:8080'
    # Instala dependencias en CADA arranque (capta cambios de package.json) antes de
    # levantar la API. node_modules es un volumen NOMBRADO → persiste entre make
    # down/start, así el install es incremental (rápido) y no se pierde como antes.
    command: >
      sh -c "npm install --legacy-peer-deps &&
             npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             npx nx serve api"
    volumes:
      - ./:/app
      - pasaeventos_api_node_modules:/app/node_modules
    depends_on:
      pasaeventos_db:
        condition: service_healthy
      pasaeventos_redis:
        condition: service_healthy
      pasaeventos_rabbitmq:
        condition: service_healthy
      pasaeventos_localstack:
        condition: service_started
      pasaeventos_mailhog:
        condition: service_started
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.10

  pasaeventos_db:
    image: postgres:16-alpine
    container_name: pasaeventos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pasaeventos
      POSTGRES_PASSWORD: pasaeventos
      POSTGRES_DB: pasaeventos
      TZ: America/Guatemala
    ports:
      - '54320:5432'
    volumes:
      - pasaeventos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pasaeventos -d pasaeventos']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.4

  # Frontend Angular 20 SSR (PWA). Parte del monorepo: `make start` levanta
  # backend + frontend con un solo comando. En SSR (Node dentro del contenedor)
  # el API se resuelve por la red Docker (pasaeventos_api); en el navegador,
  # por localhost:8080 (host). Ver core/config del frontend (isPlatformServer).
  pasaeventos_frontend:
    container_name: pasaeventos_frontend
    build:
      context: .
      dockerfile: ./docker/angular/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      # SSR → API por la red interna; navegador → API por el host.
      - API_URL_SERVER=http://pasaeventos_api:8080/api/v1
      - API_URL_BROWSER=http://localhost:8080/api/v1
    ports:
      - '4200:4200'
    # Instala dependencias en CADA arranque (capta cambios de package.json) antes de
    # ng serve. node_modules es un volumen NOMBRADO → persiste e install incremental.
    command: >
      sh -c "npm install --legacy-peer-deps && rm -rf .angular/cache && npm run dev"
    volumes:
      - ./frontend:/app
      - pasaeventos_frontend_node_modules:/app/node_modules
      # Spec OpenAPI del backend (solo lectura) para regenerar el SDK tipado.
      - ./docs:/docs:ro
    depends_on:
      pasaeventos_api:
        condition: service_started
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.12

  pasaeventos_adminer:
    image: adminer:latest
    container_name: pasaeventos_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: pasaeventos_db
      ADMINER_DESIGN: dracula
    ports:
      - '8082:8080'
    depends_on:
      - pasaeventos_db
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.5

  pasaeventos_redis:
    image: redis:7-alpine
    container_name: pasaeventos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '63790:6379'
    volumes:
      - pasaeventos_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.6

  pasaeventos_rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pasaeventos_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pasaeventos
      RABBITMQ_DEFAULT_PASS: pasaeventos
    ports:
      - '56720:5672'
      - '15673:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.7

  pasaeventos_mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    container_name: pasaeventos_mailhog
    restart: unless-stopped
    logging:
      driver: 'none'
    ports:
      - '10250:1025'
      - '8026:8025'
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.8

  pasaeventos_localstack:
    image: localstack/localstack:3
    container_name: pasaeventos_localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEBUG: '0'
      PERSISTENCE: '1'
    ports:
      - '45660:4566'
    volumes:
      - pasaeventos_localstack_data:/var/lib/localstack
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.9

  # Observabilidad: Jaeger all-in-one (OTLP + UI). No arranca por defecto; solo
  # con el profile: `docker compose -f docker-compose.local.yml --profile observability up -d`.
  # Luego OTEL_ENABLED=true + OTEL_EXPORTER_OTLP_ENDPOINT=http://pasaeventos_jaeger:4318.
  pasaeventos_jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: pasaeventos_jaeger
    profiles: ['observability']
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16687:16686' # UI (host no-default → 16687)
    networks:
      pasaeventos_network:
        ipv4_address: 172.16.0.11

volumes:
  pasaeventos_pg_data:
    external: true
  pasaeventos_redis_data:
    external: true
  pasaeventos_localstack_data:
    external: true
  # node_modules gestionados por compose (NO external): persisten entre make down/start
  # y el install-on-start los mantiene al día. `make rebuild` los renueva si hace falta.
  pasaeventos_api_node_modules:
  pasaeventos_frontend_node_modules:

networks:
  pasaeventos_network:
    external: true
    name: pasaeventos_network
