<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Variante del favicon para el tema Marquesina (día): gradiente ámbar→coral
       (--pe-primary #f2802a → --pe-primary-2 #ff5470). El ThemeService cambia el
       href del <link rel=icon svg> a este archivo cuando el tema activo es marquesina. -->
  <defs>
    <linearGradient id="peGradM" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f2802a" />
      <stop offset="1" stop-color="#ff5470" />
    </linearGradient>
  </defs>
  <path
    d="M6 7h20a2 2 0 0 1 2 2v4a3 3 0 0 0 0 6v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4a3 3 0 0 0 0-6V9a2 2 0 0 1 2-2Z"
    fill="url(#peGradM)"
  />
  <path d="M13 12.5 20 16l-7 3.5v-7Z" fill="#0b0c11" />
</svg>
