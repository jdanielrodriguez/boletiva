<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Boletiva</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Favicon = logo del header (mark boleto+play). SVG en navegadores modernos;
       .ico (nuestro logo, ya NO el de Angular) como respaldo y para el /favicon.ico
       que el navegador pide por defecto. El ?v= fuerza refresco (el favicon se cachea
       muy fuerte); súbelo si vuelves a cambiar el icono. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- Anti-parpadeo de tema: estampa el tema cacheado (cookie pe_theme) ANTES del
       primer paint, para que un usuario recurrente no vea el tema por defecto por un
       instante. El ThemeService de Angular refina la franja tras hidratar. -->
  <script>
    (function () {
      try {
        var m = document.cookie.match(/(?:^|; )pe_theme=([^;]+)/);
        if (m && (m[1] === 'pulso' || m[1] === 'marquesina')) {
          document.documentElement.setAttribute('data-theme', m[1]);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
