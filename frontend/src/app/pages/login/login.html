<div class="auth-wrap">
  <section class="auth-card">
    <h1>Iniciar sesión</h1>
    <p class="auth-sub">Entra para comprar y gestionar tus boletos.</p>

    @if (needs2fa()) {
      <p data-testid="twofa-notice">Se requiere verificación en dos pasos. (Continúa en F3.)</p>
    } @else {
      @if (error()) {
        <p class="form-error" data-testid="login-error">{{ error() }}</p>
      }

      <form (ngSubmit)="submit()">
        <div class="field">
          <label for="email">Correo</label>
          <input
            id="email"
            type="email"
            name="email"
            autocomplete="email"
            placeholder="tucorreo@ejemplo.com"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            required
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            required
          />
        </div>

        <button type="submit" class="primary btn-block" [disabled]="submitting()">
          {{ submitting() ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>

      <p class="auth-alt">¿Aún no tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
    }
  </section>
</div>
