<header class="site-header">
  <a class="brand" routerLink="/" aria-label="Pasa Eventos - inicio">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="peGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop stop-color="#7b5cff" />
          <stop offset="1" stop-color="#e14eca" />
        </linearGradient>
      </defs>
      <path
        d="M6 7h20a2 2 0 0 1 2 2v4a3 3 0 0 0 0 6v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4a3 3 0 0 0 0-6V9a2 2 0 0 1 2-2Z"
        fill="url(#peGrad)"
      />
      <path d="M13 12.5 20 16l-7 3.5v-7Z" fill="#0b0c11" />
    </svg>
    <span><span class="brand-em">pasa</span><span class="brand-rest">eventos</span></span>
  </a>

  <nav class="site-nav">
    <a routerLink="/">Eventos</a>
  </nav>

  <div class="session-area" data-testid="session-area">
    @if (session.isAuthenticated()) {
      <div class="user-menu">
        <button type="button" class="user-trigger" data-testid="user-menu-trigger" (click)="toggleMenu()">
          <span class="greeting" data-testid="session-greeting">Hola, {{ session.user()?.firstName }}</span>
          <span class="caret" aria-hidden="true">▾</span>
        </button>
        @if (menuOpen()) {
          <div class="user-dropdown" data-testid="user-dropdown">
            <a routerLink="/cuenta" (click)="closeMenu()" data-testid="dd-perfil">Perfil</a>

            <div class="dd-quick" aria-label="Accesos rápidos">
              <a [routerLink]="['/cuenta']" [queryParams]="{ s: 'metodos' }" (click)="closeMenu()" data-testid="dd-metodos">Método de pago</a>
              <a [routerLink]="['/cuenta']" [queryParams]="{ s: 'activos' }" (click)="closeMenu()" data-testid="dd-boletos">Boletos</a>
              <a [routerLink]="['/cuenta']" [queryParams]="{ s: 'wallet' }" (click)="closeMenu()" data-testid="dd-wallet">Wallet</a>
            </div>

            @if (session.hasAnyRole(['promoter', 'admin'])) {
              <a routerLink="/promotor" (click)="closeMenu()" data-testid="promoter-link">Panel del promotor</a>
            }
            @if (session.hasAnyRole(['admin'])) {
              <a routerLink="/configuracion" (click)="closeMenu()" data-testid="config-link">Configuración (admin)</a>
            }
            <button type="button" data-testid="logout-btn" (click)="logout()">Salir de sesión</button>
          </div>
        }
      </div>
    } @else {
      <a class="btn primary" routerLink="/login" data-testid="login-link">Iniciar sesión</a>
    }
  </div>
</header>
