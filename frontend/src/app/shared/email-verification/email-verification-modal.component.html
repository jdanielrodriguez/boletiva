@if (visible()) {
  <div class="modal-backdrop" data-testid="verify-email-modal">
    <section class="modal-card">
      <h2>{{ 'auth.verifyModalTitle' | translate }}</h2>
      <p class="auth-sub" [innerHTML]="'auth.verifyModalBody' | translate: { email: email() }"></p>

      @if (error()) {
        <p class="form-error" role="alert" data-testid="verify-modal-error">{{ error() }}</p>
      }

      <form (ngSubmit)="verify()">
        <app-otp-input [value]="code()" (valueChange)="onCode($event)" [disabled]="working()" />
        <button
          type="submit"
          class="primary btn-block"
          [disabled]="working() || code().length < 6"
          data-testid="verify-modal-submit"
        >
          {{ working() ? ('auth.verifyingCode' | translate) : ('auth.verifyBtn' | translate) }}
        </button>
      </form>

      <p class="auth-alt verify-nocode">{{ 'auth.verifyNoCode' | translate }}</p>
      <!-- Reenvío estandarizado (F2): botón + cronómetro + estado. El botón "cerrar
           sesión" va proyectado en la misma fila de acciones. -->
      <app-resend-code
        testId="verify-modal-resend"
        label="auth.verifyResend"
        resendingLabel="auth.verifyResending"
        [resending]="resending()"
        [info]="info()"
        (resend)="resend()"
      >
        <button type="button" class="btn small subtle" (click)="signOut()" data-testid="verify-modal-logout">
          <app-icon name="logout" [size]="15" />
          {{ 'auth.verifyLogout' | translate }}
        </button>
      </app-resend-code>
    </section>
  </div>
}
