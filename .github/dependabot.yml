# G4.3 (Auditoría 4): PRs automáticos de actualización de dependencias, agrupados y
# semanales, para no acumular deuda de seguridad (supply-chain). npm (backend raíz +
# frontend) + GitHub Actions. Las actualizaciones de seguridad llegan aparte, sin límite.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
