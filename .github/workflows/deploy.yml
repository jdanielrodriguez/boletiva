name: Deploy to Cloud Run

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: pasa-eventos

      - name: Build Docker image (Artifact Registry)
        run: |
          gcloud builds submit --tag us-central1-docker.pkg.dev/pasa-eventos/pasaeventos-backend/api:${GITHUB_REF_NAME}

      # Migraciones: se aplican antes de enrutar tráfico. Requiere acceso a la BD
      # (Cloud SQL Auth Proxy). Ver docs/DESPLIEGUE.md §5.
      # - name: DB migrate deploy
      #   run: npx prisma migrate deploy

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pasaeventos-api \
            --image us-central1-docker.pkg.dev/pasa-eventos/pasaeventos-backend/api:${GITHUB_REF_NAME} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory=2Gi --cpu=2 --concurrency=200 --min-instances=1 --max-instances=20 \
            --set-env-vars=NODE_ENV=production,STORAGE_PROVIDER=gcs,GCLOUD_PROJECT_ID=pasa-eventos,GCS_BUCKET=pasaeventos-prod-media \
            --set-secrets=DATABASE_URL=pasaeventos-database-url:latest,REDIS_URL=pasaeventos-redis-url:latest,AMQP_URL=pasaeventos-amqp-url:latest,MAIL_PASS=pasaeventos-mail-pass:latest,JWT_ACCESS_SECRET=pasaeventos-jwt-access-secret:latest,JWT_REFRESH_SECRET=pasaeventos-jwt-refresh-secret:latest,GCS_SERVICE_ACCOUNT_JSON=pasaeventos-gcs-sa-json:latest
