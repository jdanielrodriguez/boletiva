name: CI

on:
  push:
    branches:
      - develop
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Build Docker images and start services
        run: make init-test

      - name: Wait for API health (valida postgres, redis, rabbitmq, storage y mail)
        run: |
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/health || true)
            if [ "$code" = "200" ]; then echo "API + dependencias OK"; exit 0; fi
            echo "Esperando a la API... ($i)"; sleep 2
          done
          echo "La API no quedó sana a tiempo"; docker logs pasaeventos_api || true; exit 1

      - name: Seed base de datos
        run: docker exec pasaeventos_api npm run db:seed

      - name: Unit tests (con coverage)
        run: make test

      - name: Smoke E2E (HTTP + navegador headless)
        run: make smoke

      - name: Show pasaeventos_api logs if failed
        if: failure()
        run: docker logs pasaeventos_api || true
