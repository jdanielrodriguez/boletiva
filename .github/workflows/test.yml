# ==============================================================================
# test.yml — Pruebas backend + frontend en CADA push (cualquier rama) y en PR.
#
# Objetivo: garantizar código PRÍSTINO antes de cualquier merge/deploy.
# Es el ÚNICO workflow que corre en ramas normales.
#
# También es REUTILIZABLE (`workflow_call`): staging.yml y release-prod.yml lo
# invocan como gate previo al despliegue (no se duplican los pasos de prueba).
#
# No requiere ningún secret: solo levanta el stack local con Docker y corre las
# suites (backend en el contenedor; frontend directo en el runner con Chrome).
# ==============================================================================
name: Test

on:
  # Solo ramas de TRABAJO (feature/*, fix/*, release/*, …). `develop` y `master` NO
  # se listan aquí a propósito: sus tests los corre el workflow de deploy
  # (staging.yml en develop, release-prod.yml en master) vía `workflow_call`, así el
  # mismo commit NO se testea dos veces. Se quitó `pull_request` porque duplicaba el
  # run del push de la rama (el estado del run del push ya aparece en el PR).
  push:
    branches-ignore:
      - develop
      - master
  workflow_call: # invocable desde staging.yml / release-prod.yml

# Cancela runs SUPERADOS en el mismo ref: varios push seguidos a la misma rama dejan
# corriendo solo el último (no se apilan corridas de tests). El nombre incluye
# github.workflow → una corrida directa (Test) y una invocada por un deploy no se
# cancelan entre sí.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  # ----------------------------------------------------------------------------
  # Detecta QUÉ cambió para correr SOLO las suites afectadas: cambios de backend →
  # tests de backend; de frontend → tests de frontend; ambos → ambos. (Igual criterio
  # que el deploy path-filtered de release-prod.yml.) En un push ambiguo (rama nueva
  # / sin base) paths-filter marca todo como cambiado → corren ambas, que es lo seguro.
  # ----------------------------------------------------------------------------
  changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'api/**'
              - 'prisma/**'
              - 'Dockerfile'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig*.json'
              - 'Makefile'
              - 'docker-compose*.yml'
            frontend:
              - 'frontend/**'
              - 'docker/angular/**'

  # ----------------------------------------------------------------------------
  # Backend: levanta el stack (postgres/redis/rabbit/mailhog/localstack) con
  # docker-compose, espera health, siembra la BD y corre lint + unit + smoke E2E.
  # ----------------------------------------------------------------------------
  backend-test:
    name: Backend (lint + unit + smoke)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Copiar .env.example a .env
        run: cp .env.example .env

      - name: Construir imágenes y levantar el stack de pruebas
        run: make init-test

      - name: Esperar health de la API (valida postgres, redis, rabbitmq, storage y mail)
        run: |
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/health || true)
            if [ "$code" = "200" ]; then echo "API + dependencias OK"; exit 0; fi
            echo "Esperando a la API... ($i)"; sleep 2
          done
          echo "La API no quedó sana a tiempo"; docker logs pasaeventos_api || true; exit 1

      - name: Seed base de datos
        run: docker exec pasaeventos_api npm run db:seed

      - name: Lint backend
        run: docker exec pasaeventos_api npx nx lint api

      - name: Unit tests
        # Sin --coverage en CI: la instrumentación de cobertura es pesada en memoria y
        # sobre el runner limitado (2 cores/7GB) + stack Docker puede provocar OOM/timeouts
        # en la corrida serial de e2e sobre BD real. El gate no exige umbral de cobertura;
        # la cobertura se mide en local con `make test`. (jest.retry.ts reintenta flakes en CI;
        # jest.config `workerIdleMemoryLimit` recicla el worker; +4GB de heap por si acaso.)
        run: docker exec -e NODE_OPTIONS=--max-old-space-size=4096 pasaeventos_api npx nx test api

      - name: Smoke E2E (HTTP + navegador headless)
        run: make smoke

      - name: Logs de la API si falla
        if: failure()
        run: docker logs pasaeventos_api || true

  # ----------------------------------------------------------------------------
  # Frontend: Angular 20. Corre directo en el runner (no en Docker) con el
  # Chrome preinstalado de ubuntu-latest. schema.ts del SDK ya está commiteado
  # (no depende de /docs/openapi.json en CI).
  # ----------------------------------------------------------------------------
  frontend-test:
    name: Frontend (lint + karma headless)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Karma usa ChromeHeadlessCI (--no-sandbox); apunta al Chrome del runner.
      CHROME_BIN: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        run: npm run lint

      - name: Unit tests (karma headless)
        run: npm test -- --watch=false

  # ----------------------------------------------------------------------------
  # Auditoría de dependencias (supply chain). NO bloqueante por ahora (hay CVEs
  # heredados por triar); documenta la exposición en cada push. Cambiar a
  # bloqueante (quitar continue-on-error) cuando el árbol esté limpio a `high`.
  # ----------------------------------------------------------------------------
  audit:
    name: npm audit (supply chain)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      # G4.3 (auditoría 4, ajustado): prod-deps BLOQUEA solo en high/critical (umbral real).
      # Los 'moderate' se REPORTAN como informativo (no tumban el step): hoy son transitivos
      # de uuid<11.1.1 dentro de exceljs/gaxios/@google-cloud/storage, sin fix sin romper
      # (audit fix --force degrada exceljs) y por un path que NO usamos (v4 aleatorio, no
      # v3/v5/v6 con buf). El job es continue-on-error igual.
      - name: Audit backend (prod deps — high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Audit frontend (prod deps — high/critical)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      # Informativo (no bloquea): moderate en todo el árbol (prod + dev) para visibilidad.
      - name: Audit backend (moderate, informativo)
        run: npm audit --audit-level=moderate || true
      - name: Audit frontend (moderate, informativo)
        working-directory: frontend
        run: npm audit --audit-level=moderate || true
