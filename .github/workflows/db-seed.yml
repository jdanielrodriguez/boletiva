# ==============================================================================
# db-seed.yml — Sembrar/actualizar la BASELINE en PROD (NO destructivo).
#
# Aplica el schema (`prisma db push`) + siembra la baseline (settings, usuarios y
# catálogo demo). Es idempotente (upsert) y NO borra data → seguro para el PRIMER
# arranque de la BD vacía y para refrescar defaults. Equivale a `make prod-db-seed`
# pero desde GitHub Actions (WIF + Cloud SQL Auth Proxy). Para BORRAR y resembrar,
# usa el workflow "DB Reset (PROD)".
#
# Disparo: SOLO manual (workflow_dispatch). Aparece en la pestaña Actions cuando el
# archivo ya está en la rama por defecto (master).
#
# Requiere: variables WIF_PROVIDER / WIF_SERVICE_ACCOUNT + secreto
# pasaeventos-database-url (formato socket host=/cloudsql/PROJECT:REGION:INSTANCE).
# ==============================================================================
name: DB Seed (PROD) — baseline (no destructivo)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # WIF (OIDC → GCP)

env:
  PROJECT_ID: boletera-502405
  REGION: us-central1
  CLOUDSQL: boletera-502405:us-central1:pasaeventos-pg
  DB_SECRET: pasaeventos-database-url

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Prisma 7: `db push` YA NO genera el cliente y `npm install` tampoco (sin
      # postinstall). Sin esto el seed ts-node falla: '@prisma/client' no exporta
      # PrismaClient hasta que se genera.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Authenticate to GCP (WIF, no keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Seed baseline (db push + seed) vía Cloud SQL Auth Proxy
        # Contraseñas FUERTES de los usuarios semilla en PROD (crea estos repository
        # secrets; si faltan, el seed cae a 'Password123' por el `|| ` del seed).
        env:
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
          SEED_ASESOR_PASSWORD: ${{ secrets.SEED_ASESOR_PASSWORD }}
          SEED_PROMOTER_PASSWORD: ${{ secrets.SEED_PROMOTER_PASSWORD }}
          SEED_BUYER_PASSWORD: ${{ secrets.SEED_BUYER_PASSWORD }}
        run: |
          set -euo pipefail
          # 1) Proxy con socket unix que casa con el host del secreto DATABASE_URL.
          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mkdir -p /cloudsql && sudo chown "$(id -u)" /cloudsql
          ./cloud-sql-proxy --unix-socket /cloudsql "${CLOUDSQL}" &
          PROXY_PID=$!
          for i in $(seq 1 20); do
            [ -S "/cloudsql/${CLOUDSQL}/.s.PGSQL.5432" ] && break || sleep 1
          done
          # 2) DATABASE_URL de prod (socket) desde Secret Manager.
          export DATABASE_URL="$(gcloud secrets versions access latest --secret="${DB_SECRET}")"
          # 3) Aplicar schema + sembrar baseline (idempotente, NO destructivo).
          npx prisma db push
          npm run db:seed
          kill "$PROXY_PID" 2>/dev/null || true
          echo "✅ Baseline sembrada en PROD."
